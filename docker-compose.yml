services:
  db:
    image: miguelgarduno123/memoreto-db:latest
    container_name: postgres_local
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"


  backend:
    image: miguelgarduno123/backend-memoreto  
    ports:
      - "18462:18462"
    environment:
      - FLASK_DEBUG=1
    env_file:
      - .env

  frontend:
    image: miguelgarduno123/frontend-memoreto
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
