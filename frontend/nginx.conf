server {
    listen 80;
    server_name localhost;
    
    # Previene que Nginx elimine el puerto 8080 de Docker al hacer redirecciones 301 (ej. al agregar la barra / al final)
    absolute_redirect off;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Buscamos el archivo, luego como directorio con su index.html directo (sin redirección), 
        # luego como archivo .html, y por último el index como fallback para SPAs.
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # Proxy inverso para solucionar CORS en local
    # Redirige todo lo que empiece con /api/ al servidor de Flask
    location /api/ {
        # 172.17.0.1 es la IP del host por defecto en Docker Linux (donde corre Flask en el puerto 18462)
        proxy_pass http://172.17.0.1:18462/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    error_page 404 /index.html;
}